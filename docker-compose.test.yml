version: '3.8'

services:
  mysql-test:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: leetcode_test
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-test:
    # We will use the image built in Jenkins pipeline
    image: ${BACKEND_IMAGE:-iqbalmahad4039/leetcode-backend}:${GIT_COMMIT_SHORT:-latest}
    environment:
      - MYSQL_DSN=root:root@tcp(mysql-test:3306)/leetcode_test?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_URL=redis://redis-test:6379/0
      - JWT_SECRET=testsecret
    expose:
      - "8080"
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - default

  frontend-test:
    image: ${FRONTEND_IMAGE:-iqbalmahad4039/leetcode-frontend}:${GIT_COMMIT_SHORT:-latest}
    environment:
      - BACKEND_URL=http://backend-test:8080
    expose:
      - "3000"
    depends_on:
      - backend-test
    networks:
      - default

networks:
  default:
    name: asahkoding_test_net
