version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: leetcode_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: leetcode_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: leetcode_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leetcode_backend
    ports:
      - "8080:8080"
    environment:
      - MYSQL_DSN=root:password@tcp(mysql:3306)/leetcode_db?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=rahasia_jwt_sangat_aman
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mysql
      - redis
    volumes:
      # DOOD: Mengizinkan API Backend di dalam kontainer untuk menjalankan Docker Run
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leetcode_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: leetcode_jenkins
    user: root # Butuh root untuk mengakses docker.sock
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # DOOD: Jenkins juga butuh Docker untuk melakukan CI/CD "docker build"
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  jenkins_home:
